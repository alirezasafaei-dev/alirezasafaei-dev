<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">System mindset map</title>
  <desc id="desc">A visual map of product, engineering, operations, and trust working together.</desc>
  <defs>
    <linearGradient id="cardA" x1="52" y1="40" x2="336" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="cardB" x1="352" y1="40" x2="636" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="cardC" x1="652" y1="40" x2="936" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="cardD" x1="952" y1="40" x2="1236" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" rx="28" fill="#F8FAFC"/>
  <rect x="52" y="40" width="248" height="240" rx="24" fill="url(#cardA)"/>
  <rect x="352" y="40" width="248" height="240" rx="24" fill="url(#cardB)"/>
  <rect x="652" y="40" width="248" height="240" rx="24" fill="url(#cardC)"/>
  <rect x="952" y="40" width="248" height="240" rx="24" fill="url(#cardD)"/>
  <path d="M300 160H352" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M600 160H652" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M900 160H952" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <text x="82" y="98" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="1.3">PRODUCT</text>
  <text x="82" y="142" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Clarity</text>
  <text x="82" y="178" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Scope, outcome,</text>
  <text x="82" y="204" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="18">conversion, usability.</text>
  <text x="382" y="98" fill="#99F6E4" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="1.3">ENGINEERING</text>
  <text x="382" y="142" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Depth</text>
  <text x="382" y="178" fill="#CCFBF1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Architecture, testing,</text>
  <text x="382" y="204" fill="#CCFBF1" font-family="Segoe UI, Arial, sans-serif" font-size="18">quality, maintainability.</text>
  <text x="682" y="98" fill="#DDD6FE" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="1.3">OPERATIONS</text>
  <text x="682" y="142" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Resilience</text>
  <text x="682" y="178" fill="#EDE9FE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Deployment, recovery,</text>
  <text x="682" y="204" fill="#EDE9FE" font-family="Segoe UI, Arial, sans-serif" font-size="18">monitoring, constraints.</text>
  <text x="982" y="98" fill="#FED7AA" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="1.3">TRUST</text>
  <text x="982" y="142" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Proof</text>
  <text x="982" y="178" fill="#FFEDD5" font-family="Segoe UI, Arial, sans-serif" font-size="18">Live products, reports,</text>
  <text x="982" y="204" fill="#FFEDD5" font-family="Segoe UI, Arial, sans-serif" font-size="18">evidence, case studies.</text>
</svg>
